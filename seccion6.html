<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Sección 6 – Caja Negra</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Roboto+Mono&display=swap"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    html, body {
      height: 100%;
      background: #000;
      font-family: 'Roboto', sans-serif; /* Roboto global */
      color: #fff;
      overflow: hidden;
    }

    .contenedor {
      position: relative;
      width: 80%;
      max-width: 900px;
      height: 500px;
      margin: 50px auto;
      background: rgba(240,240,240,0.1);
      backdrop-filter: blur(12px);
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      overflow: hidden;
    }

    .cuadro {
      width: 400px;
      height: 400px;
      border-radius: 8px;
      padding: 24px;
      font-size: 14px;
      line-height: 1.4;
      text-align: left;
      cursor: pointer;
      overflow-wrap: break-word;
      display: flex;
      align-items: center;
      transition: transform 0.2s ease;
    }

    /* Opción 1: cita – monospace */
    .cuadro.rojo.cita {
      background: rgba(193,18,31,0.8);
      color: #fff;
      font-family: 'Roboto Mono', monospace;
      font-size: 18px;
    }

    /* Opción 2: párrafo – Roboto */
    .cuadro.rojo.parrafo {
      background: rgba(193,18,31,0.8);
      color: #fff;
      font-family: 'Roboto', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* cuadro negro */
    .cuadro.negro {
      background: #000;
      color: #000;
    }

    /* Animaciones */
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .pop {
      animation: pop 0.2s ease forwards;
    }

    @keyframes vibrar {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-2px,1px); }
      50%  { transform: translate(2px,-1px); }
      75%  { transform: translate(-1px,2px); }
      100% { transform: translate(0,0); }
    }
    .vibrar {
      animation: vibrar 0.3s ease forwards;
    }

    @keyframes vibrarFuerte {
      0%   { transform: translate(0,0); }
      20%  { transform: translate(-4px,2px); }
      40%  { transform: translate(4px,-2px); }
      60%  { transform: translate(-3px,3px); }
      80%  { transform: translate(3px,-3px); }
      100% { transform: translate(0,0); }
    }
    .vibrar-fuerte {
      animation: vibrarFuerte 0.4s ease forwards;
    }

    @keyframes glitch {
      0%   { filter: brightness(1); }
      25%  { filter: brightness(1.4); }
      50%  { filter: brightness(1.2); }
      75%  { filter: brightness(1.3); }
      100% { filter: brightness(1); }
    }
    .glitch {
      animation: glitch 0.4s ease forwards;
    }

    .nav-button {
      position: fixed;
      bottom: 20px;
      padding: 8px 12px;
      font-family: 'Roboto Mono', monospace;
      font-size: 14px;
      color: rgb(136,136,136);
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
      z-index: 10;
    }
    .nav-button.prev { left: 20px; }
    .nav-button.restart { right: 20px; }
    .nav-button:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="contenedor" id="contenedor">
    <!-- Opción 1: cita -->
    <div class="cuadro rojo cita" id="cuadroRojo">
      “El medio es el mensaje”<br>– Marshall McLuhan.
    </div>
    <div class="cuadro negro" id="cuadroNegro"></div>
  </div>

  <a href="seccion5.html" class="nav-button prev">&lt; anterior</a>
  <button class="nav-button restart" onclick="window.location.href='index.html'">
    ↻ reiniciar
  </button>

  <script>
    const rojo = document.getElementById('cuadroRojo');
    const negro = document.getElementById('cuadroNegro');
    const cont  = document.getElementById('contenedor');

    const cita = `“El medio es el mensaje”<br>– Marshall McLuhan.`;
    const textoLargo = `La interfaz es también ocultadora, pues no hace visible el funcionamiento interno de su interacción humano-máquina, es una caja negra. Ésta facilita la experiencia del usuario, quien sólo percibe e interpreta resultados visibles (inputs y outputs), omitiendo un sistema complejo al que no tiene acceso, y que condiciona pensamiento y acciones a través de las decisiones de diseño, restricciones ideológicas o condiciones técnicas. La forma y estructura de la interfaz configura la experiencia y el significado que adquiere la interacción, con esta reflexión inicial es posible remitir a la frase:`;

    let mostrando = true;

    rojo.addEventListener('click', () => {
      // pop y vibrar
      rojo.classList.add('pop');
      negro.classList.add('vibrar');
      setTimeout(() => {
        rojo.classList.remove('pop');
        negro.classList.remove('vibrar');
      }, 300);

      if (mostrando) {
        // pasar a párrafo (Roboto)
        rojo.innerHTML = textoLargo;
        rojo.classList.remove('cita');
        rojo.classList.add('parrafo');
      } else {
        // volver a cita (Monospace)
        rojo.innerHTML = cita;
        rojo.classList.remove('parrafo');
        rojo.classList.add('cita');
      }
      mostrando = !mostrando;
    });

    negro.addEventListener('click', () => {
      negro.classList.add('vibrar-fuerte');
      cont.classList.add('glitch');
      setTimeout(() => {
        negro.classList.remove('vibrar-fuerte');
        cont.classList.remove('glitch');
      }, 600);
    });
  </script>
</body>
</html>
